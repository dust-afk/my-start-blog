<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">CSS Box Model</title>
  <desc id="desc">Margin, border, padding, and content layers.</desc>
  <defs>
    <style>
      .label { font-family: "Segoe UI", Arial, sans-serif; fill: #ffffff; font-size: 54px; font-weight: 500; }
      .label-dark { font-family: "Segoe UI", Arial, sans-serif; fill: #2d2d2d; font-size: 54px; font-weight: 500; }
      .small { font-size: 40px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="820" fill="#2f6f74" />
  <rect x="100" y="110" width="1000" height="600" fill="#f4f1c2" />
  <rect x="200" y="190" width="800" height="440" fill="#05a6b7" />
  <rect x="300" y="270" width="600" height="280" fill="#f8a23a" />

  <text x="600" y="70" text-anchor="middle" class="label">margin-top</text>
  <text x="600" y="180" text-anchor="middle" class="label-dark">border-top</text>
  <text x="600" y="250" text-anchor="middle" class="label">padding-top</text>
  <text x="600" y="430" text-anchor="middle" class="label">content</text>
  <text x="600" y="610" text-anchor="middle" class="label">padding-bottom</text>
  <text x="600" y="680" text-anchor="middle" class="label-dark">border-bottom</text>
  <text x="600" y="780" text-anchor="middle" class="label">margin-bottom</text>

  <text x="90" y="430" transform="rotate(-90 90 430)" text-anchor="middle" class="label">margin-left</text>
  <text x="185" y="430" transform="rotate(-90 185 430)" text-anchor="middle" class="label-dark">border-left</text>
  <text x="285" y="430" transform="rotate(-90 285 430)" text-anchor="middle" class="label">padding-left</text>

  <text x="1110" y="430" transform="rotate(90 1110 430)" text-anchor="middle" class="label">margin-right</text>
  <text x="1015" y="430" transform="rotate(90 1015 430)" text-anchor="middle" class="label-dark">border-right</text>
  <text x="915" y="430" transform="rotate(90 915 430)" text-anchor="middle" class="label">padding-right</text>

  <line x1="300" y1="748" x2="900" y2="748" stroke="#222" stroke-width="4" />
  <line x1="300" y1="730" x2="300" y2="766" stroke="#222" stroke-width="4" />
  <line x1="900" y1="730" x2="900" y2="766" stroke="#222" stroke-width="4" />
  <text x="600" y="808" text-anchor="middle" class="label-dark small">width</text>

  <line x1="42" y1="270" x2="42" y2="550" stroke="#222" stroke-width="4" />
  <line x1="24" y1="270" x2="60" y2="270" stroke="#222" stroke-width="4" />
  <line x1="24" y1="550" x2="60" y2="550" stroke="#222" stroke-width="4" />
  <text x="10" y="415" transform="rotate(-90 10 415)" text-anchor="middle" class="label-dark small">height</text>
</svg>
